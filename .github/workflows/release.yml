name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: kindling-mac-apple-silicon
          - os: macos-latest
            target: x86_64-apple-darwin
            name: kindling-mac-intel
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: kindling-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: kindling-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rust

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp rust/target/${{ matrix.target }}/release/kindling-cli ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp rust/target/${{ matrix.target }}/release/kindling-cli.exe ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
